<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ Credit Card Fraud Detector</h1>
        <p>Enter transaction details to predict fraud risk. Model trained on Kaggle dataset.</p>
        
        <form id="predictionForm">
            <div class="input-group">
                <label>Time (seconds): <span id="timeHelp">(0-172792)</span></label>
                <input type="range" id="time" min="0" max="172800" value="0" step="1">
                <span id="timeValue">0</span>
            </div>

            <div class="input-group">
                <label>Amount ($): <span id="amountHelp">(0-25691)</span></label>
                <input type="range" id="amount" min="0" max="25691" value="100" step="1">
                <span id="amountValue">$100</span>
            </div>

            <!-- V1-V28 PCA features (realistic ranges from dataset) -->
            <div class="features-grid">
                <div class="feature-col">
                    <label>V1: <span id="v1Help"></span></label>
                    <input type="range" id="v1" min="-56" max="52" value="0" step="0.1">
                    <span id="v1Value">0</span>
                </div>
                <!-- Repeat for V2-V28 with dataset ranges -->
                <script>
                    const vFeatures = [
                        {id: 'v2', min: -15.9, max: 28.5},
                        {id: 'v3', min: -10, max: 16.9},
                        {id: 'v4', min: -4.4, max: 14.1},
                        {id: 'v5', min: -8.5, max: 10.5},
                        {id: 'v6', min: -20.6, max: 18.8},
                        {id: 'v7', min: -15.8, max: 14.6},
                        {id: 'v8', min: -30.5, max: 18},
                        {id: 'v9', min: -4.2, max: 12.3},
                        {id: 'v10', min: -3.2, max: 16.9},
                        {id: 'v11', min: -4.2, max: 7.6},
                        {id: 'v12', min: -6.1, max: 6.2},
                        {id: 'v13', min: -4.9, max: 5.7},
                        {id: 'v14', min: -4.2, max: 6.2},
                        {id: 'v15', min: -10.3, max: 10.1},
                        {id: 'v16', min: -14.4, max: 17.6},
                        {id: 'v17', min: -26.1, max: 23.8},
                        {id: 'v18', min: -11.9, max: 12.9},
                        {id: 'v19', min: -2.6, max: 7.5},
                        {id: 'v20', min: -1.8, max: 5.1},
                        {id: 'v21', min: -2.4, max: 3.4},
                        {id: 'v22', min: -7.3, max: 7.9},
                        {id: 'v23', min: -9.6, max: 10.5},
                        {id: 'v24', min: -6.1, max: 7.4},
                        {id: 'v25', min: -4.9, max: 8.3},
                        {id: 'v26', min: -3.5, max: 9},
                        {id: 'v27', min: -2.1, max: 5.3},
                        {id: 'v28', min: -1.5, max: 4.2}
                    ];
                    vFeatures.forEach(f => {
                        document.write(`
                            <div class="feature-col">
                                <label>${f.id.toUpperCase()}: </label>
                                <input type="range" id="${f.id}" min="${f.min}" max="${f.max}" value="0" step="0.01">
                                <span id="${f.id}Value">0</span>
                            </div>
                        `);
                    });
                </script>
            </div>

            <button type="submit">🔮 Predict Fraud</button>
        </form>

        <div id="result" class="result hidden">
            <h2 id="prediction">...</h2>
            <div class="confidence-bar">
                <div id="confidenceFill" class="fill"></div>
            </div>
            <p id="explanation"></p>
        </div>

        <div id="loading" class="loading hidden">Loading model...</div>
        <div id="error" class="error hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
